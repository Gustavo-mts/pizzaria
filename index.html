<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Pizzaria</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="login-body">
  <div class="login-container">
    <h1 class="login-title">Bem-vindo 🍕</h1>
    <p class="login-subtitle">Entre para começar seu pedido</p>

    <form id="loginForm" class="login-form">
      <input type="text" id="name" placeholder="Seu nome" required />
      <input type="tel" id="phone" placeholder="Seu WhatsApp" required />
      <button type="submit">Entrar</button>
    </form>
  </div>

  <script>
    // Se já estiver logado, vai pro dashboard
    const userRaw = localStorage.getItem("pizza_user");
    if (userRaw) {
      window.location.href = "./dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();

      localStorage.setItem("pizza_user", JSON.stringify({ name, phone }));

      window.location.href = "./dashboard.html";
    });
  </script>
</body>
</html>
